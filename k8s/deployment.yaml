apiVersion: apps/v1
kind: Deployment
metadata:
  name: starttech-backend-api
  labels:
    app: starttech-backend-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: starttech-backend-api
  template:
    metadata:
      labels:
        app: starttech-backend-api
    spec:
      containers:
        - name: backend
          # Replaced by CI with the ECR image URI + git SHA tag on each deploy.
          image: PLACEHOLDER_ECR_IMAGE_URI
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: ENABLE_CACHE
              value: "true"
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: starttech-backend-secrets
                  key: redis-addr
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: starttech-backend-secrets
                  key: mongo-uri
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: starttech-backend-secrets
                  key: jwt-secret-key
            - name: ALLOWED_ORIGINS
              value: "https://YOUR_CLOUDFRONT_DOMAIN"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"